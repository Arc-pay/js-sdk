name: Publish SDK to npm

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-npm.yml"
      - "package.json"
      - "README.md"
      - "LICENSE"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "go/**"
      - "tsconfig.json"
      - "tsup.config.ts"
      - "vitest.config.ts"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          !contains(github.event.head_commit.message, '[skip publish]') &&
          !startsWith(github.event.head_commit.message, 'chore(release): publish @thavguard/arc-pay@')
        )
      }}
    runs-on: ${{ vars.ARCPAY_RUNNER_LANES_ENABLED == 'true' && fromJSON('["self-hosted","arcpay-docker-build"]') || fromJSON('["self-hosted","arcpay-ci"]') }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Verify preinstalled Node.js
        run: |
          node --version

          pnpm --version
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm approve-builds esbuild

      - name: Prepare release version
        id: version
        run: |
          version="$(node scripts/prepare-release-version.mjs)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Verify package
        run: pnpm prepack

      - name: Verify preinstalled Go
        run: |
          go version
          go env GOMODCACHE GOCACHE

      - name: Verify Go SDK
        run: go test ./...
        working-directory: go

      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Commit release version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src/index.ts src/react/index.ts src/server/client.ts go/client.go
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore(release): publish @thavguard/arc-pay@${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Tag Go module
        run: |
          if git rev-parse "go/v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            exit 0
          fi
          git tag "go/v${{ steps.version.outputs.version }}"
          git push origin "go/v${{ steps.version.outputs.version }}"
